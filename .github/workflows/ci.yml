name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd automation-client
          npm ci
      - name: Run tests
        run: |
          cd automation-client
          npm test
      - name: Build
        run: |
          cd automation-client
          npm run build
